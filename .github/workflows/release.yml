name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Guard against panic = "abort"
        if: runner.os != 'Windows'
        run: bash scripts/check-panic-unwind.sh

      - name: Build wheels (abi3)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features pyo3/extension-module --out dist
          # abi3-py38 feature is set in pyproject.toml via [tool.maturin].
          # One wheel covers Python 3.8+ per PEP 384.
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/carve-lang
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
